<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFRC Donation - Support Our Cause</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">


</head>
<body>
  <div class="donation-card">
    <div class="header-section">
      <div class="logo-box">
        <img src="cifrc.png" alt="IFRC Logo">
      </div>
      <h2>Support Our Cause</h2>
    </div>

    <div class="form-body">
      <!-- Connect form to register.php -->
      <form id="donationForm" action="register.php" method="POST">
        <div class="grid-container">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" placeholder="john@example.com" required>
          </div>
        </div>

        <div class="grid-container">
          <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="tel" class="form-control" name="contact" placeholder="+91 0000000000" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nationality</label>
            <input type="text" class="form-control" name="nationality" placeholder="e.g. Indian" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Donation Amount (INR)</label>
          <div class="input-group">
            <span class="input-group-text">₹</span>
            <input type="number" class="form-control" name="amount" placeholder="Enter amount" min="1" required style="border-radius: 0 10px 10px 0;">
          </div>
        </div>

        <button type="submit" class="btn-donate">Donate Now</button>
        <p class="footer-note">Secure & Encrypted Transaction</p>
      </form>
    </div>
  </div>
</body>
</html>
