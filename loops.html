<!DOCTYPE html>
<html>
<head>
    <title>For...Of Loop Example</title>
</head>
<body>
    <h2>JavaScript For...Of Loop Demo</h2>
    <p>Open console (F12 → Console tab) to see output.</p>

    <script>
        let students = ["Aman", "Riya", "Palak", "Simran"];

        // Using for...of loop
        for (let student of students) {
            console.log("Student name: " + student);
        }
    </script>
</body>
</html>
