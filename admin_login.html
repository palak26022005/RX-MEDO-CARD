<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RX Medocard – Admin Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0047AB, #00C6FF);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: "Poppins", sans-serif;
        }

        .container-box {
            display: flex;
            width: 85%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .left-panel {
            flex: 1.1;
            background: linear-gradient(135deg, #022c73, #0066cc);
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .project-title {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .project-sub {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .right-panel {
            flex: 1;
            padding: 50px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(10px);
        }

        .form-control,
        .input-group-text {
            border-radius: 12px;
        }

        .form-control:focus {
            box-shadow: none !important;
            border-color: #005ad3;
        }

        .login-btn {
            background: #005ad3;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #003e99;
        }

        @media(max-width: 850px) {
            .container-box {
                flex-direction: column;
                width: 92%;
            }

            .left-panel {
                padding: 40px 30px;
            }

            .right-panel {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="container-box">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <img src="./images/logo.webp" width="120" style="border-radius:50%;"/>
            <h1 class="project-title">RX Medocard</h1>
            <p class="project-sub">Admin Console Login</p>

            <p style="font-size:15px; opacity:0.8;">
                Access the administration panel to manage users,<br>
                monitor card activity and maintain security of<br>
                the RX Medocard system.
            </p>
        </div>

        <!-- RIGHT PANEL (LOGIN) -->
        <div class="right-panel">
            <h3 class="fw-bold mb-4">Welcome Back, Admin</h3>

            <!-- ✅ UPDATED FORM (Connected to admin_login.php) -->
            <form action="admin_login.php" method="POST">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Enter admin username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="login-btn mt-3">Login</button>

                <p class="text-center mt-4 text-muted" style="font-size: 13px;">
                    © 2025 RX Medocard • Secure Admin Panel
                </p>

            </form>
        </div>
    </div>

</body>

</html>
